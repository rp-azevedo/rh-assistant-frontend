<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistente RH</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen { display: none; width: 100%; }
    .screen.active { display: flex; }

    #login-screen {
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: white;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: #e8f0fe;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
      font-size: 26px;
    }

    .brand h1 { font-size: 20px; font-weight: 600; color: #1a1a2e; }
    .brand p { font-size: 14px; color: #888; margin-top: 4px; }

    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
    .field input {
      width: 100%; padding: 10px 14px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; outline: none; color: #1a1a2e;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #185FA5; }

    .login-btn {
      width: 100%; padding: 11px;
      background: #185FA5; color: white;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 500;
      cursor: pointer; margin-top: 0.5rem;
      transition: background 0.15s;
    }
    .login-btn:hover { background: #0C447C; }
    .login-btn:active { transform: scale(0.98); }
    .login-btn:disabled { background: #aaa; cursor: not-allowed; }

    .error-msg {
      font-size: 13px; color: #d32f2f;
      text-align: center; margin-top: 10px; min-height: 20px;
    }

    #chat-screen {
      flex-direction: column;
      height: 100vh;
      max-height: 100vh;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      background: white;
      box-shadow: 0 0 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: #075E54;
      color: white;
      flex-shrink: 0;
    }

    .chat-header-left { display: flex; align-items: center; gap: 10px; }

    .chat-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: #25D366;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .chat-header-name { font-size: 15px; font-weight: 600; }
    .chat-header-sub { font-size: 12px; opacity: 0.8; }

    .user-info {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; opacity: 0.9;
    }

    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
    }

    .logout-btn {
      background: none; border: none; cursor: pointer;
      color: white; opacity: 0.7; font-size: 20px;
      padding: 4px; margin-left: 8px; line-height: 1;
    }
    .logout-btn:hover { opacity: 1; }

    .notion-bar {
      display: flex; align-items: center; gap: 5px; justify-content: center;
      padding: 5px; font-size: 11px; color: #666;
      background: #f9f9f9; border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }
    .online-dot { width: 6px; height: 6px; border-radius: 50%; background: #25D366; }

    .messages-area {
      flex: 1; overflow-y: auto;
      padding: 12px; display: flex; flex-direction: column;
      gap: 8px; background: #ECE5DD;
      min-height: 0;
    }

    .msg {
      max-width: 80%; padding: 8px 12px;
      border-radius: 8px; font-size: 14px; line-height: 1.55;
    }
    .msg.bot { background: white; align-self: flex-start; border-top-left-radius: 2px; color: #111; }
    .msg.user { background: #DCF8C6; align-self: flex-end; border-top-right-radius: 2px; color: #111; }
    .msg .time { font-size: 11px; color: #999; text-align: right; margin-top: 4px; }
    .msg.bot .time { text-align: left; }

    .msg.bot .content h1,
    .msg.bot .content h2,
    .msg.bot .content h3 {
      font-size: 15px; font-weight: 600;
      margin: 8px 0 4px;
    }
    .msg.bot .content h1:first-child,
    .msg.bot .content h2:first-child,
    .msg.bot .content h3:first-child { margin-top: 0; }
    .msg.bot .content p { margin: 4px 0; }
    .msg.bot .content p:first-child { margin-top: 0; }
    .msg.bot .content p:last-child { margin-bottom: 0; }
    .msg.bot .content strong { font-weight: 600; }
    .msg.bot .content em { font-style: italic; }
    .msg.bot .content ul, .msg.bot .content ol {
      padding-left: 20px; margin: 4px 0;
    }
    .msg.bot .content li { margin: 2px 0; }
    .msg.bot .content hr {
      border: none; border-top: 1px solid #ddd;
      margin: 8px 0;
    }
    .msg.bot .content code {
      background: #f0f0f0; padding: 1px 5px;
      border-radius: 3px; font-size: 13px;
    }
    .msg.bot .content a { color: #185FA5; text-decoration: underline; }

    .typing {
      display: none; align-self: flex-start;
      background: white; border-radius: 8px; border-top-left-radius: 2px;
      padding: 10px 14px; gap: 3px; align-items: center;
    }
    .typing span {
      display: inline-block; width: 7px; height: 7px;
      background: #bbb; border-radius: 50%;
      animation: bounce 1.2s infinite; margin: 0 2px;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    .input-area {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; background: #f0f0f0;
      border-top: 1px solid #ddd;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1; border-radius: 24px; padding: 10px 16px;
      font-size: 14px; border: none; background: white;
      outline: none; color: #111;
    }
    .send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: #075E54; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: white;
    }
    .send-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>

<div id="login-screen" class="screen active">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">🏢</div>
      <h1>Assistente RH</h1>
      <p>Acesso exclusivo para colaboradores</p>
    </div>
    <div class="field">
      <label for="username">Usuário</label>
      <input type="text" id="username" placeholder="seu.nome" autocomplete="username" />
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Entrar</button>
    <p class="error-msg" id="login-error"></p>
  </div>
</div>

<div id="chat-screen" class="screen">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="chat-avatar">🤖</div>
      <div>
        <div class="chat-header-name">Assistente RH</div>
        <div class="chat-header-sub">online</div>
      </div>
    </div>
    <div class="user-info">
      <div class="user-avatar" id="user-initials">--</div>
      <span id="user-display"></span>
      <button class="logout-btn" onclick="doLogout()" title="Sair">⎋</button>
    </div>
  </div>
  <div class="notion-bar">
    <div class="online-dot"></div>
    Conectado ao wiki da empresa
  </div>
  <div class="messages-area" id="msgs">
    <div class="typing" id="typing"><span></span><span></span><span></span></div>
  </div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Digite sua dúvida..." />
    <button class="send-btn" onclick="sendMessage()" title="Enviar">➤</button>
  </div>
</div>

<script>
  const BACKEND_URL = 'https://rh-assistant-backend-production.up.railway.app';

  let currentUser = null;
  let history = [];

  function getTime() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function renderMarkdown(text) {
    if (typeof marked !== 'undefined') {
      return marked.parse(text);
    }
    return text.replace(/\n/g, '<br>');
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const err = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    if (!username || !password) {
      err.textContent = 'Preencha usuário e senha.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Entrando...';
    err.textContent = '';

    try {
      const res = await fetch(`${BACKEND_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (!res.ok) {
        err.textContent = data.error || 'Erro ao entrar.';
        return;
      }

      currentUser = { username, password, name: data.name };
      const initials = data.name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
      document.getElementById('user-initials').textContent = initials;
      document.getElementById('user-display').textContent = data.name.split(' ')[0];

      history = [];
      const msgs = document.getElementById('msgs');
      const typing = document.getElementById('typing');
      msgs.innerHTML = '';
      msgs.appendChild(typing);

      document.getElementById('login-screen').classList.remove('active');
      document.getElementById('chat-screen').classList.add('active');

      appendMsg(`Olá, ${data.name.split(' ')[0]}! 👋 Como posso ajudar você hoje? Pode me perguntar sobre férias, benefícios, políticas internas e muito mais.`, 'bot');

    } catch (e) {
      err.textContent = 'Não foi possível conectar ao servidor.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }

  function doLogout() {
    currentUser = null;
    history = [];
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('chat-screen').classList.remove('active');
    document.getElementById('login-screen').classList.add('active');
  }

  function appendMsg(text, role) {
    const msgs = document.getElementById('msgs');
    const typing = document.getElementById('typing');
    const div = document.createElement('div');
    div.className = 'msg ' + role;

    const contentHtml = role === 'bot' ? renderMarkdown(text) : text.replace(/\n/g, '<br>');
    div.innerHTML = '<div class="content">' + contentHtml + '</div><div class="time">' + getTime() + '</div>';

    msgs.insertBefore(div, typing);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function setTyping(show) {
    const t = document.getElementById('typing');
    t.style.display = show ? 'flex' : 'none';
    document.getElementById('msgs').scrollTop = 99999;
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text || !currentUser) return;
    input.value = '';
    appendMsg(text, 'user');
    history.push({ role: 'user', content: text });
    setTyping(true);

    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: currentUser.username,
          password: currentUser.password,
          messages: history
        })
      });

      const data = await res.json();
      setTyping(false);

      if (!res.ok || data.error) {
        appendMsg('Desculpe, tive um problema. Tente novamente em instantes.', 'bot');
        return;
      }

      appendMsg(data.reply, 'bot');
      history.push({ role: 'assistant', content: data.reply });

    } catch (e) {
      setTyping(false);
      appendMsg('Erro de conexão. Verifique sua internet e tente novamente.', 'bot');
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('login-screen').classList.contains('active')) doLogin();
    else sendMessage();
  });
</script>
</body>
</html>
